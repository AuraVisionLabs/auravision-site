name: Weekly Blog Post

on:
  schedule:
    # Every Monday at 9:00 AM UTC
    - cron: "0 9 * * 1"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-blog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-blog.mjs

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: blog/weekly-${{ github.run_id }}
          commit-message: "blog: add weekly auto-generated post"
          title: "📝 Weekly Blog Draft"
          body: |
            Auto-generated blog post for review.

            **Please review:**
            - [ ] Content accuracy — fact-check any claims or statistics
            - [ ] Tone and style
            - [ ] Add a cover image to `/public/images/uploads/blog/` and update the `coverImage` frontmatter
            - [ ] Check the case study link is relevant

            _Generated by the weekly blog agent. Merge to publish, close to discard._
          labels: blog, draft
          delete-branch: true
