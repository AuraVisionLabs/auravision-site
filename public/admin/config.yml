backend:
  name: git-gateway
  branch: master

media_folder: public/images/uploads
public_folder: /images/uploads

collections:
  - name: "case-studies"
    label: "Case Studies"
    label_singular: "Case Study"
    folder: "src/content/case-studies"
    create: true
    slug: "{{slug}}"
    sortable_fields: ["pubDate", "title", "client"]
    summary: "{{client}} — {{title}}"
    editor:
      size: half
    fields:
      # ── Core info ──
      - label: "Title"
        name: "title"
        widget: "string"
        hint: "SEO-friendly headline for the case study"

      - label: "Client"
        name: "client"
        widget: "string"

      - label: "Publish Date"
        name: "pubDate"
        widget: "datetime"
        date_format: "YYYY-MM-DD"
        time_format: false
        format: "YYYY-MM-DD"

      - label: "Sort Order"
        name: "sortOrder"
        widget: "number"
        default: 999
        value_type: "int"
        hint: "Lower numbers appear first (default 999)"
        required: false

      - label: "Summary"
        name: "summary"
        widget: "text"
        hint: "Short description used in cards and SEO meta"

      # ── Images ──
      - label: "Client Logo"
        name: "clientLogo"
        widget: "image"
        required: false
        hint: "SVG or PNG logo displayed on the case study card"

      - label: "Cover Image"
        name: "coverImage"
        widget: "image"
        required: false
        hint: "Hero image shown at the top of the case study"

      # ── Taxonomy ──
      - label: "Tags"
        name: "tags"
        widget: "list"
        required: false
        collapsed: true
        hint: "Comma-separated or add individually"
        summary: "{{fields.tag}}"

      # ── Key Metrics ──
      - label: "Key Metrics"
        name: "metrics"
        widget: "list"
        required: false
        collapsed: true
        minimize_collapsed: true
        summary: "{{fields.value}} — {{fields.label}}"
        hint: "Headline stats shown at the top of the case study (e.g. '63%' / 'Increase in changing room entries')"
        fields:
          - label: "Value"
            name: "value"
            widget: "string"
            hint: "e.g. 5X, 63%, 10%"
          - label: "Label"
            name: "label"
            widget: "string"
            hint: "e.g. Increase in changing room entries"

      # ── Body ──
      - label: "Body"
        name: "body"
        widget: "markdown"
        hint: "Main content — use ## for section headings"

      # ── Testimonial ──
      - label: "Testimonial"
        name: "testimonial"
        widget: "object"
        required: false
        collapsed: true
        hint: "Optional client quote displayed as a highlight block"
        fields:
          - label: "Headliner"
            name: "headliner"
            widget: "string"
            hint: "Short pull-quote or headline"
          - label: "Quote"
            name: "quote"
            widget: "text"
          - label: "Name"
            name: "name"
            widget: "string"
          - label: "Role"
            name: "role"
            widget: "string"
          - label: "Photo"
            name: "photo"
            widget: "image"
            required: false

  - name: "press"
    label: "Press"
    label_singular: "Press Article"
    folder: "src/content/press"
    create: true
    slug: "{{slug}}"
    sortable_fields: ["pubDate", "title", "publication"]
    summary: "{{publication}} — {{title}}"
    editor:
      size: half
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
        hint: "Headline of the article"

      - label: "Publication"
        name: "publication"
        widget: "string"
        hint: "Name of the publication (e.g. TechCrunch, Forbes)"

      - label: "Publish Date"
        name: "pubDate"
        widget: "datetime"
        date_format: "YYYY-MM-DD"
        time_format: false
        format: "YYYY-MM-DD"

      - label: "External URL"
        name: "externalUrl"
        widget: "string"
        hint: "Full URL to the original article"

      - label: "Cover Image"
        name: "coverImage"
        widget: "image"
        required: false
        hint: "Cover image for the press card"

      - label: "Contain Image"
        name: "containImage"
        widget: "boolean"
        default: false
        required: false
        hint: "Show the full image (contained) instead of cropping to fill"

      - label: "Summary"
        name: "summary"
        widget: "text"
        hint: "Short description of the article"
  - name: "blog"
    label: "Blog"
    label_singular: "Blog Post"
    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    sortable_fields: ["pubDate", "title"]
    summary: "{{title}}"
    editor:
      size: half
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
        hint: "Headline for the blog post"

      - label: "Publish Date"
        name: "pubDate"
        widget: "datetime"
        date_format: "YYYY-MM-DD"
        time_format: false
        format: "YYYY-MM-DD"

      - label: "Cover Image"
        name: "coverImage"
        widget: "image"
        required: false
        hint: "Hero image shown at the top of the blog post"

      - label: "Summary"
        name: "summary"
        widget: "text"
        hint: "Short description used in cards and SEO meta"

      - label: "Tags"
        name: "tags"
        widget: "list"
        required: false
        collapsed: true
        hint: "Comma-separated or add individually"

      - label: "Body"
        name: "body"
        widget: "markdown"
        hint: "Main content — use ## for section headings"

  - name: "decks"
    label: "Pitch Decks"
    label_singular: "Pitch Deck"
    folder: "src/content/decks"
    create: true
    slug: "{{slug}}"
    sortable_fields: ["date", "title", "prospect"]
    summary: "{{prospect}} — {{title}}"
    editor:
      size: half
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
        hint: "Internal name for the deck"

      - label: "Date"
        name: "date"
        widget: "datetime"
        date_format: "YYYY-MM-DD"
        time_format: false
        format: "YYYY-MM-DD"
        required: false

      - label: "Slides"
        name: "slides"
        widget: "list"
        collapsed: false
        summary: "{{fields.type}} — {{fields.title}}"
        hint: "Add slides in order. Each slide has a type that determines its layout."
        types:
          - label: "Cover"
            name: "cover"
            widget: "object"
            summary: "Cover: {{fields.title}}"
            fields:
              - { label: "Type", name: "type", widget: "hidden", default: "cover" }
              - { label: "Title", name: "title", widget: "string", hint: "e.g. Retail Discovery Deck" }
              - { label: "Tagline", name: "tagline", widget: "string" }
              - { label: "Logo", name: "logo", widget: "image", required: false, hint: "Custom logo (defaults to Aura Vision)" }

          - label: "Tech"
            name: "tech"
            widget: "object"
            summary: "Tech: {{fields.title}}"
            fields:
              - { label: "Type", name: "type", widget: "hidden", default: "tech" }
              - { label: "Category", name: "category", widget: "string", required: false, default: "Technology", hint: "Label shown above the title (e.g. Technology)" }
              - { label: "Title", name: "title", widget: "string", required: false }
              - { label: "Subtitle", name: "subtitle", widget: "string", required: false }
              - { label: "Callout", name: "callout", widget: "markdown", required: false, hint: "Use raw mode to write HTML (e.g. <span style='color:#4ade80'>✓</span>)" }
              - { label: "Video", name: "video", widget: "file", required: false }

          - label: "Table"
            name: "table"
            widget: "object"
            summary: "Table: {{fields.title}}"
            fields:
              - { label: "Type", name: "type", widget: "hidden", default: "table" }
              - { label: "Category", name: "category", widget: "string", required: false, hint: "Label shown above the title" }
              - { label: "Title", name: "title", widget: "string", required: false }
              - { label: "Subtitle", name: "subtitle", widget: "string", required: false }
              - { label: "Layout", name: "layout", widget: "select", default: "grid", options: ["grid", "table-striped", "table"], hint: "grid = spaced cards, table-striped = compact rows with alternating backgrounds, table = compact rows no background" }
              - { label: "Column Widths", name: "colWidths", widget: "list", required: false, field: { label: "Width", name: "width", widget: "number", value_type: "int" }, hint: "Proportional column widths (e.g. 1, 1, 1 for equal or 28, 40, 23, 12 for weighted). Defaults to 3 equal columns." }
              - label: "Rows"
                name: "rows"
                widget: "list"
                label_singular: "Row"
                summary: "Row {{index}}"
                fields:
                  - label: "Cells"
                    name: "cells"
                    widget: "list"
                    label_singular: "Cell"
                    summary: "Cell {{index}}"
                    fields:
                      - label: "Blocks"
                        name: "blocks"
                        widget: "list"
                        label_singular: "Block"
                        summary: "{{fields.type}}: {{fields.text}}"
                        types:
                          - label: "Text"
                            name: "text"
                            widget: "object"
                            fields:
                              - { label: "Type", name: "type", widget: "hidden", default: "text" }
                              - { label: "Text", name: "text", widget: "markdown", hint: "Supports HTML — use raw mode for inline styles" }
                              - { label: "Size", name: "size", widget: "select", default: "p-md", options: ["h1", "h2", "h3", "h4", "h5", "h6", "p-lg", "p-md", "p-sm", "p-xs"], hint: "Text size preset" }
                              - { label: "Background", name: "bg", widget: "select", required: false, default: "none", options: ["none", "cyan", "fuchsia", "purple", "blue", "red", "orange"], hint: "Tinted background behind this text block" }
                          - label: "Image"
                            name: "image"
                            widget: "object"
                            fields:
                              - { label: "Type", name: "type", widget: "hidden", default: "image" }
                              - { label: "Image", name: "src", widget: "image" }
                              - { label: "Alt Text", name: "alt", widget: "string", required: false }
                          - label: "Heatmap"
                            name: "heatmap"
                            widget: "object"
                            fields:
                              - { label: "Type", name: "type", widget: "hidden", default: "heatmap" }
                          - label: "Chat"
                            name: "chat"
                            widget: "object"
                            fields:
                              - { label: "Type", name: "type", widget: "hidden", default: "chat" }
                          - label: "Device"
                            name: "device"
                            widget: "object"
                            fields:
                              - { label: "Type", name: "type", widget: "hidden", default: "device" }
                          - label: "Snapshot"
                            name: "snapshot"
                            widget: "object"
                            fields:
                              - { label: "Type", name: "type", widget: "hidden", default: "snapshot" }
                              - { label: "Image", name: "src", widget: "image" }
                              - { label: "Camera Overlay", name: "camera", widget: "image", required: false, hint: "Small image overlaid top-left" }
                          - label: "Inline Table"
                            name: "inlinetable"
                            widget: "object"
                            fields:
                              - { label: "Type", name: "type", widget: "hidden", default: "inlinetable" }
                              - label: "Columns"
                                name: "columns"
                                widget: "list"
                                label_singular: "Column"
                                summary: "{{fields.label}}: {{fields.header}}"
                                fields:
                                  - { label: "Label", name: "label", widget: "string", hint: "Bottom label (e.g. 3 months)" }
                                  - { label: "Header", name: "header", widget: "string", hint: "Top cell text (e.g. A/B testing)" }
                                  - { label: "Level", name: "level", widget: "number", value_type: "int", min: 1, hint: "Height of the stacked column (1 = shortest)" }
                          - label: "Logos"
                            name: "logos"
                            widget: "object"
                            fields:
                              - { label: "Type", name: "type", widget: "hidden", default: "logos" }
                              - { label: "Fit", name: "fit", widget: "select", default: "fill", options: ["fill", "fixed"], required: false, hint: "fill = scale to container width, fixed = fixed height left-aligned" }
                              - label: "Items"
                                name: "items"
                                widget: "list"
                                label_singular: "Logo"
                                summary: "{{fields.alt}}"
                                fields:
                                  - { label: "Image", name: "src", widget: "image" }
                                  - { label: "Alt Text", name: "alt", widget: "string", required: false }
                          - label: "Testimonial"
                            name: "testimonial"
                            widget: "object"
                            fields:
                              - { label: "Type", name: "type", widget: "hidden", default: "testimonial" }
                              - { label: "Headliner", name: "headliner", widget: "string", hint: "Bold italic quote headline" }
                              - { label: "Quote", name: "quote", widget: "text", hint: "Supporting quote text" }
                          - label: "Profile"
                            name: "profile"
                            widget: "object"
                            fields:
                              - { label: "Type", name: "type", widget: "hidden", default: "profile" }
                              - { label: "Name", name: "name", widget: "string" }
                              - { label: "Role", name: "role", widget: "string", hint: "Use \\n for line breaks" }
                              - { label: "Photo", name: "photo", widget: "image", required: false }
                              - { label: "Logo", name: "logo", widget: "image", required: false }
                              - { label: "Company", name: "company", widget: "string", required: false }
                      - label: "Cell Options"
                        name: "options"
                        widget: "object"
                        required: false
                        collapsed: true
                        fields:
                          - { label: "Background", name: "background", widget: "select", required: false, default: "none", options: ["none", "cyan", "fuchsia", "purple", "blue", "red", "orange"], hint: "Adds a tinted background with padding and rounded corners" }
                          - { label: "Glow Outline", name: "glow", widget: "select", required: false, default: "none", options: ["none", "cyan", "fuchsia", "purple", "blue", "red", "orange"], hint: "Adds a coloured outline with glow effect" }
