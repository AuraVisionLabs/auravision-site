backend:
  name: git-gateway
  branch: master

media_folder: public/images/uploads
public_folder: /images/uploads

collections:
  - name: "case-studies"
    label: "Case Studies"
    label_singular: "Case Study"
    folder: "src/content/case-studies"
    create: true
    slug: "{{slug}}"
    sortable_fields: ["pubDate", "title", "client"]
    summary: "{{client}} — {{title}}"
    editor:
      size: half
    fields:
      # ── Core info ──
      - label: "Title"
        name: "title"
        widget: "string"
        hint: "SEO-friendly headline for the case study"

      - label: "Client"
        name: "client"
        widget: "string"

      - label: "Publish Date"
        name: "pubDate"
        widget: "datetime"
        date_format: "YYYY-MM-DD"
        time_format: false
        format: "YYYY-MM-DD"

      - label: "Sort Order"
        name: "sortOrder"
        widget: "number"
        default: 999
        value_type: "int"
        hint: "Lower numbers appear first (default 999)"
        required: false

      - label: "Summary"
        name: "summary"
        widget: "text"
        hint: "Short description used in cards and SEO meta"

      # ── Images ──
      - label: "Client Logo"
        name: "clientLogo"
        widget: "image"
        required: false
        hint: "SVG or PNG logo displayed on the case study card"

      - label: "Cover Image"
        name: "coverImage"
        widget: "image"
        required: false
        hint: "Hero image shown at the top of the case study"

      # ── Taxonomy ──
      - label: "Tags"
        name: "tags"
        widget: "list"
        required: false
        collapsed: true
        hint: "Comma-separated or add individually"
        summary: "{{fields.tag}}"

      # ── Key Metrics ──
      - label: "Key Metrics"
        name: "metrics"
        widget: "list"
        required: false
        collapsed: true
        minimize_collapsed: true
        summary: "{{fields.value}} — {{fields.label}}"
        hint: "Headline stats shown at the top of the case study (e.g. '63%' / 'Increase in changing room entries')"
        fields:
          - label: "Value"
            name: "value"
            widget: "string"
            hint: "e.g. 5X, 63%, 10%"
          - label: "Label"
            name: "label"
            widget: "string"
            hint: "e.g. Increase in changing room entries"

      # ── Body ──
      - label: "Body"
        name: "body"
        widget: "markdown"
        hint: "Main content — use ## for section headings"

      # ── Testimonial ──
      - label: "Testimonial"
        name: "testimonial"
        widget: "object"
        required: false
        collapsed: true
        hint: "Optional client quote displayed as a highlight block"
        fields:
          - label: "Headliner"
            name: "headliner"
            widget: "string"
            hint: "Short pull-quote or headline"
          - label: "Quote"
            name: "quote"
            widget: "text"
          - label: "Name"
            name: "name"
            widget: "string"
          - label: "Role"
            name: "role"
            widget: "string"
          - label: "Photo"
            name: "photo"
            widget: "image"
            required: false

  - name: "press"
    label: "Press"
    label_singular: "Press Article"
    folder: "src/content/press"
    create: true
    slug: "{{slug}}"
    sortable_fields: ["pubDate", "title", "publication"]
    summary: "{{publication}} — {{title}}"
    editor:
      size: half
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
        hint: "Headline of the article"

      - label: "Publication"
        name: "publication"
        widget: "string"
        hint: "Name of the publication (e.g. TechCrunch, Forbes)"

      - label: "Publish Date"
        name: "pubDate"
        widget: "datetime"
        date_format: "YYYY-MM-DD"
        time_format: false
        format: "YYYY-MM-DD"

      - label: "External URL"
        name: "externalUrl"
        widget: "string"
        hint: "Full URL to the original article"

      - label: "Cover Image"
        name: "coverImage"
        widget: "image"
        required: false
        hint: "Cover image for the press card"

      - label: "Contain Image"
        name: "containImage"
        widget: "boolean"
        default: false
        required: false
        hint: "Show the full image (contained) instead of cropping to fill"

      - label: "Summary"
        name: "summary"
        widget: "text"
        hint: "Short description of the article"
  - name: "blog"
    label: "Blog"
    label_singular: "Blog Post"
    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    sortable_fields: ["pubDate", "title"]
    summary: "{{title}}"
    editor:
      size: half
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
        hint: "Headline for the blog post"

      - label: "Publish Date"
        name: "pubDate"
        widget: "datetime"
        date_format: "YYYY-MM-DD"
        time_format: false
        format: "YYYY-MM-DD"

      - label: "Cover Image"
        name: "coverImage"
        widget: "image"
        required: false
        hint: "Hero image shown at the top of the blog post"

      - label: "Summary"
        name: "summary"
        widget: "text"
        hint: "Short description used in cards and SEO meta"

      - label: "Tags"
        name: "tags"
        widget: "list"
        required: false
        collapsed: true
        hint: "Comma-separated or add individually"

      - label: "Body"
        name: "body"
        widget: "markdown"
        hint: "Main content — use ## for section headings"

  - name: "decks"
    label: "Pitch Decks"
    label_singular: "Pitch Deck"
    folder: "src/content/decks"
    create: true
    slug: "{{slug}}"
    sortable_fields: ["date", "title", "prospect"]
    summary: "{{prospect}} — {{title}}"
    editor:
      size: half
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
        hint: "Internal name for the deck"

      - label: "Prospect"
        name: "prospect"
        widget: "string"
        required: false
        hint: "Company name this deck is prepared for"

      - label: "Date"
        name: "date"
        widget: "datetime"
        date_format: "YYYY-MM-DD"
        time_format: false
        format: "YYYY-MM-DD"
        required: false

      - label: "Theme"
        name: "theme"
        widget: "select"
        options: ["dark", "light"]
        default: "dark"
        required: false

      - label: "Slides"
        name: "slides"
        widget: "list"
        collapsed: true
        minimize_collapsed: true
        summary: "{{fields.type}} — {{fields.title}}"
        hint: "Add slides in order. Each slide has a type that determines its layout."
        types:
          - label: "Cover"
            name: "cover"
            widget: "object"
            summary: "Cover: {{fields.title}}"
            fields:
              - { label: "Type", name: "type", widget: "hidden", default: "cover" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Subtitle", name: "subtitle", widget: "string", required: false }
              - { label: "Logo", name: "logo", widget: "image", required: false, hint: "Custom logo (defaults to Aura Vision)" }
              - { label: "Background Image", name: "background", widget: "image", required: false }

          - label: "Metrics"
            name: "metrics"
            widget: "object"
            summary: "Metrics: {{fields.title}}"
            fields:
              - { label: "Type", name: "type", widget: "hidden", default: "metrics" }
              - { label: "Title", name: "title", widget: "string", required: false }
              - label: "Items"
                name: "items"
                widget: "list"
                summary: "{{fields.value}} — {{fields.label}}"
                fields:
                  - { label: "Value", name: "value", widget: "string", hint: "e.g. 22X, 63%, 307" }
                  - { label: "Label", name: "label", widget: "string" }

          - label: "Case Study"
            name: "case-study"
            widget: "object"
            summary: "Case Study: {{fields.ref}}"
            fields:
              - { label: "Type", name: "type", widget: "hidden", default: "case-study" }
              - { label: "Case Study Slug", name: "ref", widget: "string", hint: "Slug of the case study (e.g. virgin-media-o2-x-aura-vision-full-scale-roll-out)" }

          - label: "Testimonial"
            name: "testimonial"
            widget: "object"
            summary: "Testimonial: {{fields.name}}"
            fields:
              - { label: "Type", name: "type", widget: "hidden", default: "testimonial" }
              - { label: "Headliner", name: "headliner", widget: "string" }
              - { label: "Quote", name: "quote", widget: "text" }
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Role", name: "role", widget: "string" }
              - { label: "Photo", name: "photo", widget: "image", required: false }
              - { label: "Logo", name: "logo", widget: "image", required: false }
              - { label: "Company", name: "company", widget: "string", required: false }

          - label: "Feature"
            name: "feature"
            widget: "object"
            summary: "Feature: {{fields.title}}"
            fields:
              - { label: "Type", name: "type", widget: "hidden", default: "feature" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Subtitle", name: "subtitle", widget: "string", required: false }
              - { label: "Bullets", name: "bullets", widget: "list", required: false }
              - { label: "Image", name: "image", widget: "image", required: false }
              - { label: "Reversed Layout", name: "reversed", widget: "boolean", default: false, required: false }

          - label: "Logo Wall"
            name: "logo-wall"
            widget: "object"
            summary: "Logo Wall: {{fields.title}}"
            fields:
              - { label: "Type", name: "type", widget: "hidden", default: "logo-wall" }
              - { label: "Title", name: "title", widget: "string", required: false, default: "Trusted by leading brands" }
              - label: "Logos"
                name: "logos"
                widget: "list"
                required: false
                hint: "Leave empty to use default client logos"
                summary: "{{fields.name}}"
                fields:
                  - { label: "Name", name: "name", widget: "string" }
                  - { label: "Image", name: "src", widget: "image" }

          - label: "Image"
            name: "image"
            widget: "object"
            summary: "Image: {{fields.caption}}"
            fields:
              - { label: "Type", name: "type", widget: "hidden", default: "image" }
              - { label: "Image", name: "src", widget: "image" }
              - { label: "Alt Text", name: "alt", widget: "string", required: false }
              - { label: "Caption", name: "caption", widget: "string", required: false }

          - label: "Text"
            name: "text"
            widget: "object"
            summary: "Text: {{fields.title}}"
            fields:
              - { label: "Type", name: "type", widget: "hidden", default: "text" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Subtitle", name: "subtitle", widget: "string", required: false }
              - { label: "Body", name: "body", widget: "text", required: false }
              - { label: "Bullets", name: "bullets", widget: "list", required: false }

          - label: "Comparison"
            name: "comparison"
            widget: "object"
            summary: "Comparison: {{fields.title}}"
            fields:
              - { label: "Type", name: "type", widget: "hidden", default: "comparison" }
              - { label: "Title", name: "title", widget: "string", required: false }
              - label: "Left Column"
                name: "left"
                widget: "object"
                fields:
                  - { label: "Heading", name: "heading", widget: "string" }
                  - { label: "Items", name: "items", widget: "list" }
              - label: "Right Column"
                name: "right"
                widget: "object"
                fields:
                  - { label: "Heading", name: "heading", widget: "string" }
                  - { label: "Items", name: "items", widget: "list" }

          - label: "Call to Action"
            name: "cta"
            widget: "object"
            summary: "CTA: {{fields.title}}"
            fields:
              - { label: "Type", name: "type", widget: "hidden", default: "cta" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Subtitle", name: "subtitle", widget: "string", required: false }
              - { label: "Button Text", name: "buttonText", widget: "string", required: false, default: "Get in Touch" }
              - { label: "Button Link", name: "buttonHref", widget: "string", required: false, default: "/contact" }

      - label: "Body"
        name: "body"
        widget: "markdown"
        required: false
        hint: "Optional notes (not displayed in the deck)"