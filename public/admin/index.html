<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Content Manager | Auravision</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      CMS.registerEditorComponent({
        id: "testimonial",
        label: "Testimonial",
        pattern: /^<!-- testimonial -->$/m,
        fromBlock: function () {
          return {};
        },
        toBlock: function () {
          return "<!-- testimonial -->";
        },
        toPreview: function () {
          return '<div style="padding:16px;border:1px dashed #888;border-radius:8px;text-align:center;color:#888;">📣 Testimonial (from frontmatter) will appear here</div>';
        },
      });
    </script>
  </body>
</html>
